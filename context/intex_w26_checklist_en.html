const state = {};
let currentTab = 'all';

function getKey(cls,si,ii){ return `${cls}-${si}-${ii}`; }
function loadState(){ try{ const s=JSON.parse(localStorage.getItem('intex_checklist_en')||'{}'); Object.assign(state,s); }catch(e){} }
function saveState(){ try{ localStorage.setItem('intex_checklist_en', JSON.stringify(state)); }catch(e){} }

function buildSections(cls, container){
  data[cls].sections.forEach((sec,si)=>{
    const sd=document.createElement('div');
    sd.className='section';
    const st=document.createElement('div');
    st.className='section-title';
    st.textContent=sec.title;
    sd.appendChild(st);
    sec.items.forEach((item,ii)=>{
      const key=getKey(cls,si,ii);
      const div=document.createElement('div');
      div.className='item'+(state[key]?' checked':'');
      div.onclick=()=>toggle(key,div);
      div.innerHTML=`<div class="cb"><span class="checkmark">✓</span></div><span class="label">${item.text}</span>`;
      sd.appendChild(div);
    });
    container.appendChild(sd);
  });
}

function toggle(key,div){
  state[key]=!state[key];
  div.classList.toggle('checked',state[key]);
  saveState();
  updateProgress();
}

function updateProgress(){
  let total=0,done=0;
  const classes=currentTab==='all'?Object.keys(data):[currentTab];
  classes.forEach(cls=>{
    data[cls].sections.forEach((sec,si)=>{
      sec.items.forEach((_,ii)=>{
        total++;
        if(state[getKey(cls,si,ii)]) done++;
      });
    });
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${done} of ${total} completed`;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-pct').textContent=pct+'%';
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active',t.getAttribute('onclick').includes(`'${tab}'`));
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  updateProgress();
}

function init(){
  loadState();
  const allContainer=document.getElementById('tab-all');
  Object.keys(data).forEach(cls=>{
    const h=document.createElement('div');
    h.className='cls-header';
    h.textContent=data[cls].label;
    allContainer.appendChild(h);
    buildSections(cls,allContainer);
    buildSections(cls,document.getElementById('tab-'+cls));
  });
  updateProgress();
}

init();
